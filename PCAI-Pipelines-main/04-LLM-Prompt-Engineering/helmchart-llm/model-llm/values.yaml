# Default values for the Large Language Model (LLM).
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Allows overriding the name of the chart.
nameOverride: ""
# Allows overriding the full name of the chart.
fullnameOverride: ""

# Specifies the Persistent Volume Claim (PVC) that houses the models.
modelVolume: models-pvc

# Configuration for the large language model (LLM) service.
llm:
  name: llm
  modelname: meta/llama3-8b-instruct
  minReplicaCount: 1
  modelFormat: nvidia-nim-llama3-8b-instruct
  runtime: nvidia-nim-llama3-8b-instruct-1.0.3
  numGPUs: 1
  resources:
    limits:
      cpu: "12"
      memory: 32Gi
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"
      cpu: "12"
      memory: 32Gi
  image:
    repository: lr1-bd-harbor-registry.mip.storage.hpecorp.net/develop/nvcr.io/nim/meta/llama3-8b-instruct
    tag: 1.0.3

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podSecurityContext: {}
# fsGroup: 2000

securityContext:
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 0

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

#Platform related options
ezua:
  domainName: "${DOMAIN_NAME}"
  #Use next options in order to configure the application endpoint.
  #Example of a VirtualService is here:
  virtualService:
    endpoint: "llm-model-.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"

  authorizationPolicy:
    namespace: "istio-system"
    providerName: "oauth2-proxy"
    matchLabels:
      istio: "ingressgateway"

ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
